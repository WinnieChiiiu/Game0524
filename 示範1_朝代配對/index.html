<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>朝代配對練習</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700;900&display=swap");

    :root {
      --ink: #15100c;
      --ink-soft: #211712;
      --panel: #2b1a15;
      --paper: #f5e7bd;
      --paper-deep: #e7cf90;
      --gold: #d9a93d;
      --gold-bright: #ffd56a;
      --red: #a62a1f;
      --red-bright: #de4638;
      --green: #417b45;
      --green-bright: #72b873;
      --text: #fff3cf;
      --muted: #cdb98a;
      --shadow: rgba(0, 0, 0, 0.42);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
    }

    body {
      font-family: "Noto Serif TC", "Microsoft JhengHei", serif;
      color: var(--text);
      background:
        radial-gradient(circle at 14% 8%, rgba(217, 169, 61, 0.16), transparent 28rem),
        radial-gradient(circle at 86% 15%, rgba(166, 42, 31, 0.18), transparent 30rem),
        linear-gradient(135deg, #0e0a08 0%, #24130f 48%, #120d0b 100%);
      overflow-x: hidden;
    }

    .page {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 26px 0 34px;
    }

    header {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: end;
      padding: 18px 0 22px;
      border-bottom: 2px solid rgba(217, 169, 61, 0.42);
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 4.3rem);
      line-height: 1;
      letter-spacing: 0;
      color: var(--gold-bright);
      text-shadow: 0 5px 20px rgba(0, 0, 0, 0.48);
    }

    .subtitle {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: clamp(0.95rem, 2vw, 1.08rem);
      line-height: 1.55;
      overflow-wrap: anywhere;
    }

    .score-board {
      min-width: 156px;
      padding: 14px 18px;
      border: 1px solid var(--gold);
      background: rgba(21, 16, 12, 0.72);
      box-shadow: inset 0 0 0 1px rgba(255, 213, 106, 0.14), 0 12px 30px var(--shadow);
      text-align: center;
    }

    .score-label {
      display: block;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .score-number {
      display: block;
      margin-top: 3px;
      color: var(--gold-bright);
      font-size: 2rem;
      font-weight: 900;
    }

    .game {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 330px;
      gap: 24px;
      margin-top: 24px;
      align-items: start;
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 34px;
      margin: 0 0 12px;
      color: var(--gold-bright);
      font-size: 1.2rem;
      font-weight: 900;
    }

    .progress {
      color: var(--muted);
      font-size: 0.92rem;
      font-weight: 700;
    }

    .dynasty-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .dynasty-card {
      min-height: 228px;
      padding: 14px;
      border: 2px solid var(--gold);
      background:
        linear-gradient(145deg, rgba(245, 231, 189, 0.98), rgba(222, 195, 126, 0.96)),
        var(--paper);
      color: #321b13;
      box-shadow: 0 16px 28px var(--shadow), inset 0 0 0 2px rgba(255, 245, 210, 0.42);
      transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease;
    }

    .dynasty-card.drag-over {
      transform: translateY(-3px);
      border-color: var(--gold-bright);
      box-shadow: 0 18px 34px rgba(255, 213, 106, 0.18), 0 16px 28px var(--shadow);
    }

    .dynasty-name {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 62px;
      border-bottom: 1px solid rgba(82, 49, 18, 0.26);
      font-size: clamp(2.1rem, 4vw, 3.3rem);
      font-weight: 900;
      line-height: 1;
    }

    .drop-zone {
      display: flex;
      align-content: flex-start;
      align-items: flex-start;
      flex-wrap: wrap;
      gap: 8px;
      min-height: 128px;
      margin-top: 14px;
      padding: 10px;
      border: 1px dashed rgba(74, 44, 20, 0.42);
      background: rgba(255, 247, 221, 0.42);
    }

    .drop-zone:empty::before {
      content: "拖曳事件至此";
      display: grid;
      place-items: center;
      width: 100%;
      min-height: 106px;
      color: rgba(52, 31, 17, 0.42);
      font-size: 1rem;
      font-weight: 700;
    }

    .event-panel {
      position: sticky;
      top: 18px;
      padding: 16px;
      border: 2px solid rgba(217, 169, 61, 0.62);
      background: rgba(21, 16, 12, 0.72);
      box-shadow: 0 16px 30px var(--shadow), inset 0 0 0 1px rgba(255, 213, 106, 0.14);
    }

    .event-list {
      display: grid;
      gap: 10px;
      max-height: calc(100vh - 190px);
      overflow-y: auto;
      padding: 3px 5px 3px 0;
      scrollbar-color: var(--gold) rgba(255, 255, 255, 0.08);
      scrollbar-width: thin;
    }

    .event-card {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 10px;
      align-items: center;
      width: 100%;
      min-height: 54px;
      padding: 10px 12px;
      border: 2px solid var(--red);
      background: linear-gradient(145deg, #28130f, #170f0c);
      color: var(--text);
      box-shadow: 0 9px 16px rgba(0, 0, 0, 0.32);
      cursor: grab;
      user-select: none;
      touch-action: manipulation;
      transition: opacity 150ms ease, transform 150ms ease, border-color 150ms ease, background 150ms ease;
    }

    .event-card:active {
      cursor: grabbing;
    }

    .event-card.dragging {
      opacity: 0.55;
      transform: scale(0.98);
    }

    .event-card.selected {
      border-color: var(--gold-bright);
      background: linear-gradient(145deg, #49300c, #23170a);
      box-shadow: 0 0 0 3px rgba(255, 213, 106, 0.24), 0 12px 20px rgba(0, 0, 0, 0.34);
      transform: translateY(-2px);
    }

    .event-card.wrong {
      animation: wrongFlash 300ms ease;
    }

    .event-card.matched {
      width: auto;
      min-height: 40px;
      padding: 7px 9px;
      border-color: var(--green-bright);
      background: linear-gradient(145deg, #2f6337, #173d21);
      color: #f5ffe9;
      box-shadow: 0 7px 12px rgba(33, 87, 40, 0.22);
      cursor: default;
      font-size: 0.86rem;
    }

    .event-icon {
      width: 1.55em;
      text-align: center;
      font-size: 1.35rem;
      line-height: 1;
    }

    .event-text {
      overflow-wrap: anywhere;
      font-weight: 700;
      line-height: 1.35;
    }

    .event-card.matched .event-icon {
      font-size: 1.05rem;
    }

    .event-card.matched .event-text {
      font-size: 0.86rem;
    }

    .empty-events {
      display: none;
      min-height: 160px;
      place-items: center;
      padding: 22px;
      border: 1px dashed rgba(217, 169, 61, 0.35);
      color: var(--muted);
      text-align: center;
      line-height: 1.6;
    }

    .event-list.is-empty + .empty-events {
      display: grid;
    }

    .victory {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      padding: 22px;
      background: rgba(10, 7, 5, 0.78);
      z-index: 10;
    }

    .victory.show {
      display: grid;
      animation: goldBurst 850ms ease;
    }

    .victory-box {
      width: min(520px, 100%);
      padding: 34px 28px;
      border: 3px solid var(--gold-bright);
      background:
        radial-gradient(circle at center top, rgba(255, 213, 106, 0.2), transparent 16rem),
        linear-gradient(145deg, #321a12, #130c0a);
      text-align: center;
      box-shadow: 0 0 48px rgba(255, 213, 106, 0.42), 0 20px 54px rgba(0, 0, 0, 0.6);
    }

    .victory-title {
      margin: 0;
      color: var(--gold-bright);
      font-size: clamp(2.2rem, 8vw, 4.2rem);
      line-height: 1;
    }

    .victory-text {
      margin: 16px 0 24px;
      color: var(--text);
      font-size: 1.18rem;
      line-height: 1.7;
    }

    button {
      min-height: 48px;
      padding: 10px 22px;
      border: 2px solid var(--gold-bright);
      background: var(--red);
      color: #fff7d8;
      font: 900 1.05rem/1 "Noto Serif TC", "Microsoft JhengHei", serif;
      cursor: pointer;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.32);
    }

    button:hover,
    button:focus-visible {
      background: var(--red-bright);
      outline: 3px solid rgba(255, 213, 106, 0.28);
      outline-offset: 2px;
    }

    @keyframes wrongFlash {
      0% {
        border-color: var(--red-bright);
        background: #4a1110;
        transform: translateX(0);
      }
      25% {
        transform: translateX(-7px);
      }
      50% {
        transform: translateX(7px);
      }
      100% {
        border-color: var(--red);
        background: linear-gradient(145deg, #28130f, #170f0c);
        transform: translateX(0);
      }
    }

    @keyframes goldBurst {
      0% {
        background: rgba(10, 7, 5, 0.5);
        box-shadow: inset 0 0 0 rgba(255, 213, 106, 0);
      }
      45% {
        background: rgba(79, 48, 13, 0.76);
        box-shadow: inset 0 0 120px rgba(255, 213, 106, 0.52);
      }
      100% {
        background: rgba(10, 7, 5, 0.78);
        box-shadow: inset 0 0 0 rgba(255, 213, 106, 0);
      }
    }

    @media (max-width: 900px) {
      .page {
        width: min(100% - 22px, 720px);
        padding-top: 18px;
      }

      header {
        grid-template-columns: 1fr;
        align-items: stretch;
      }

      .score-board {
        width: 100%;
      }

      .game {
        grid-template-columns: 1fr;
      }

      .event-panel {
        position: static;
        order: -1;
      }

      .event-list {
        display: flex;
        gap: 10px;
        max-height: none;
        overflow-x: auto;
        overflow-y: hidden;
        padding: 3px 2px 10px;
        scroll-snap-type: x proximity;
      }

      .event-list .event-card {
        flex: 0 0 230px;
        scroll-snap-align: start;
      }

      .dynasty-grid {
        grid-template-columns: 1fr;
      }

      .dynasty-card {
        min-height: 204px;
      }
    }

    @media (max-width: 460px) {
      .page {
        width: min(100% - 16px, 430px);
      }

      .event-panel,
      .dynasty-card {
        padding: 12px;
      }

      .event-list .event-card {
        flex-basis: 205px;
      }

      .section-title {
        align-items: flex-start;
        flex-direction: column;
        gap: 5px;
      }
    }
    .map-link {
      position: fixed;
      z-index: 50;
      top: 14px;
      left: 14px;
      min-height: 42px;
      display: inline-grid;
      place-items: center;
      padding: 9px 14px;
      border: 2px solid var(--gold-bright);
      background: rgba(21, 16, 12, 0.86);
      color: var(--gold-bright);
      font: 900 0.95rem/1 "Noto Serif TC", "Microsoft JhengHei", serif;
      text-decoration: none;
      box-shadow: 0 10px 22px rgba(0, 0, 0, 0.32);
    }

    .map-link:hover,
    .map-link:focus-visible {
      background: var(--red);
      outline: 3px solid rgba(255, 213, 106, 0.28);
      outline-offset: 2px;
    }

    @media (max-width: 760px) {
      .page {
        padding-top: 62px;
      }

      .map-link {
        top: 8px;
        left: 8px;
        min-height: 38px;
        padding: 8px 10px;
        font-size: 0.86rem;
      }
    }
  </style>
</head>
<body>
  <a class="map-link" href="../大冒險地圖/index.html">← 回到大地圖</a>
  <main class="page">
    <header>
      <div>
        <h1>朝代配對</h1>
        <p class="subtitle">把右側事件拖曳到正確的朝代卡格中。<br>手機可先點事件，再點朝代。</p>
      </div>
      <div class="score-board" aria-live="polite">
        <span class="score-label">嘗試次數</span>
        <span class="score-number" id="attempts">0</span>
      </div>
    </header>

    <section class="game" aria-label="朝代配對遊戲">
      <div class="dynasty-area">
        <h2 class="section-title">朝代卡格</h2>
        <div class="dynasty-grid" id="dynastyGrid"></div>
      </div>

      <aside class="event-panel">
        <h2 class="section-title">
          事件卡
          <span class="progress" id="progress">0 / 16</span>
        </h2>
        <div class="event-list" id="eventList"></div>
        <div class="empty-events">所有事件都已歸位，準備揭榜。</div>
      </aside>
    </section>
  </main>

  <div class="victory" id="victory" role="dialog" aria-modal="true" aria-labelledby="victoryTitle">
    <div class="victory-box">
      <h2 class="victory-title" id="victoryTitle">過關！</h2>
      <p class="victory-text" id="victoryText"></p>
      <button type="button" id="restartButton">再玩一次</button>
    </div>
  </div>

  <script>
    const dynasties = [
      { id: 1, name: "秦" },
      { id: 2, name: "漢" },
      { id: 3, name: "唐" },
      { id: 4, name: "宋" },
      { id: 5, name: "明" },
      { id: 6, name: "清" }
    ];

    const events = [
      { id: "e1", dynasty_id: 1, text: "統一六國", icon: "⚔️" },
      { id: "e2", dynasty_id: 1, text: "修築萬里長城", icon: "🧱" },
      { id: "e3", dynasty_id: 1, text: "焚書坑儒", icon: "🔥" },
      { id: "e4", dynasty_id: 2, text: "張騫通西域", icon: "🐪" },
      { id: "e5", dynasty_id: 2, text: "文景之治", icon: "📜" },
      { id: "e6", dynasty_id: 2, text: "罷黜百家獨尊儒術", icon: "📖" },
      { id: "e7", dynasty_id: 3, text: "貞觀之治", icon: "👑" },
      { id: "e8", dynasty_id: 3, text: "安史之亂", icon: "💥" },
      { id: "e9", dynasty_id: 3, text: "玄奘西行取經", icon: "🧘" },
      { id: "e10", dynasty_id: 4, text: "王安石變法", icon: "📜" },
      { id: "e11", dynasty_id: 4, text: "岳飛抗金", icon: "🗡️" },
      { id: "e12", dynasty_id: 5, text: "鄭和下西洋", icon: "⛵" },
      { id: "e13", dynasty_id: 5, text: "永樂大典編成", icon: "📚" },
      { id: "e14", dynasty_id: 6, text: "鴉片戰爭", icon: "💣" },
      { id: "e15", dynasty_id: 6, text: "康熙盛世", icon: "🌅" },
      { id: "e16", dynasty_id: 6, text: "辛亥革命終結", icon: "🏛️" }
    ];

    const dynastyGrid = document.querySelector("#dynastyGrid");
    const eventList = document.querySelector("#eventList");
    const attemptsEl = document.querySelector("#attempts");
    const progressEl = document.querySelector("#progress");
    const victory = document.querySelector("#victory");
    const victoryText = document.querySelector("#victoryText");
    const restartButton = document.querySelector("#restartButton");

    let attempts = 0;
    let matchedCount = 0;
    let draggedCard = null;
    let selectedCard = null;

    function shuffle(items) {
      const copy = [...items];
      for (let i = copy.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function createEventCard(event) {
      const card = document.createElement("div");
      card.className = "event-card";
      card.draggable = true;
      card.dataset.eventId = event.id;
      card.dataset.dynastyId = String(event.dynasty_id);
      card.setAttribute("role", "listitem");
      card.setAttribute("tabindex", "0");
      card.innerHTML = `
        <span class="event-icon" aria-hidden="true">${event.icon}</span>
        <span class="event-text">${event.text}</span>
      `;

      card.addEventListener("click", () => selectCard(card));
      card.addEventListener("keydown", (eventObject) => {
        if (eventObject.key === "Enter" || eventObject.key === " ") {
          eventObject.preventDefault();
          selectCard(card);
        }
      });

      card.addEventListener("dragstart", (eventObject) => {
        if (card.classList.contains("matched")) {
          eventObject.preventDefault();
          return;
        }

        draggedCard = card;
        card.classList.add("dragging");
        eventObject.dataTransfer.effectAllowed = "move";
        eventObject.dataTransfer.setData("text/plain", card.dataset.eventId);
      });

      card.addEventListener("dragend", () => {
        card.classList.remove("dragging");
        draggedCard = null;
      });

      return card;
    }

    function renderDynasties() {
      dynastyGrid.innerHTML = "";
      dynasties.forEach((dynasty) => {
        const card = document.createElement("section");
        card.className = "dynasty-card";
        card.dataset.dynastyId = String(dynasty.id);
        card.innerHTML = `
          <div class="dynasty-name">${dynasty.name}</div>
          <div class="drop-zone" data-dynasty-id="${dynasty.id}" aria-label="${dynasty.name}朝掉落區"></div>
        `;

        const dropZone = card.querySelector(".drop-zone");
        card.addEventListener("dragover", (eventObject) => {
          eventObject.preventDefault();
          eventObject.dataTransfer.dropEffect = "move";
          card.classList.add("drag-over");
        });

        card.addEventListener("dragleave", (eventObject) => {
          if (!card.contains(eventObject.relatedTarget)) {
            card.classList.remove("drag-over");
          }
        });

        card.addEventListener("drop", (eventObject) => {
          eventObject.preventDefault();
          card.classList.remove("drag-over");
          handleDrop(dropZone, draggedCard);
        });

        card.addEventListener("click", () => {
          if (selectedCard) {
            handleDrop(dropZone, selectedCard);
          }
        });

        dynastyGrid.appendChild(card);
      });
    }

    function renderEvents() {
      eventList.innerHTML = "";
      shuffle(events).forEach((event) => {
        eventList.appendChild(createEventCard(event));
      });
    }

    function updateStatus() {
      attemptsEl.textContent = String(attempts);
      progressEl.textContent = `${matchedCount} / ${events.length}`;
      eventList.classList.toggle("is-empty", matchedCount === events.length);
    }

    function selectCard(card) {
      if (card.classList.contains("matched")) {
        return;
      }

      if (selectedCard) {
        selectedCard.classList.remove("selected");
      }
      selectedCard = card;
      selectedCard.classList.add("selected");
    }

    function clearSelection() {
      if (selectedCard) {
        selectedCard.classList.remove("selected");
        selectedCard = null;
      }
    }

    function handleDrop(dropZone, activeCard = draggedCard || selectedCard) {
      if (!activeCard || activeCard.classList.contains("matched")) {
        return;
      }

      attempts += 1;
      const targetDynasty = dropZone.dataset.dynastyId;
      const cardDynasty = activeCard.dataset.dynastyId;

      if (targetDynasty === cardDynasty) {
        activeCard.classList.remove("selected");
        activeCard.classList.add("matched");
        activeCard.draggable = false;
        activeCard.removeAttribute("tabindex");
        dropZone.appendChild(activeCard);
        clearSelection();
        matchedCount += 1;
        updateStatus();
        checkVictory();
        return;
      }

      flashWrong(activeCard);
      clearSelection();
      updateStatus();
    }

    function flashWrong(card) {
      card.classList.remove("wrong");
      void card.offsetWidth;
      card.classList.add("wrong");
      window.setTimeout(() => {
        card.classList.remove("wrong");
      }, 320);
    }

    function checkVictory() {
      if (matchedCount !== events.length) {
        return;
      }

      localStorage.setItem("cert_dynasty", "true");
      window.setTimeout(() => {
        victoryText.textContent = `全部配對完成，共嘗試 ${attempts} 次。`;
        victory.classList.add("show");
        restartButton.focus();
      }, 260);
    }

    function restartGame() {
      attempts = 0;
      matchedCount = 0;
      draggedCard = null;
      selectedCard = null;
      victory.classList.remove("show");
      renderDynasties();
      renderEvents();
      updateStatus();
    }

    restartButton.addEventListener("click", restartGame);
    restartGame();
  </script>
</body>
</html>
